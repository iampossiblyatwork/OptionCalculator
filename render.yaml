# Render Blueprint — deploys the Options Premium Calculator (Flask + Docker).
# Render auto-detects render.yaml at the repo root. Connect this repo as a
# Blueprint in Render and it will build the Docker image from the repo root
# (Dockerfile and build context both default to the repo root) and run it.
# $PORT is provided by Render automatically.
services:
  - type: web
    name: options-premium-calculator
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    autoDeploy: true
